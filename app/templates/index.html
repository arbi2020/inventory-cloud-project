<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inventory Dashboard</title>

<style>
    body {
        font-family: Arial;
        margin: 0;
        background: #f4f6f9;
    }

    header {
        background: #1e293b;
        color: white;
        padding: 20px;
        text-align: center;
    }

    /* ===== SEARCH + FILTER ===== */
    .top-bar {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin: 20px;
        flex-wrap: wrap;
    }

    input, select {
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        min-width: 200px;
    }

    button {
        padding: 10px 15px;
        background: #1e293b;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    /* ===== STATS ===== */
    .stats {
        display: flex;
        justify-content: space-around;
        margin: 20px;
        flex-wrap: wrap;
    }

    .card {
        background: white;
        padding: 15px;
        border-radius: 10px;
        width: 250px;
        text-align: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        margin: 10px;
    }

    /* ===== GRID PRODUCTS ===== */
    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
        padding: 20px;
    }

    .product {
        background: white;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .title {
        font-weight: bold;
        font-size: 16px;
    }

    .category {
        color: gray;
        font-size: 14px;
    }

    .price {
        color: green;
        font-weight: bold;
    }

    .stock {
        color: #1e293b;
    }

    /* ===== ADD FORM ===== */
    .add-form {
        background: white;
        margin: 20px;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .add-form input {
        margin: 5px;
    }
</style>
</head>

<body>

<header>
    <h1>📦 Inventory Management System</h1>
</header>

<!-- ================= SEARCH + FILTER ================= -->
<div class="top-bar">

    <form method="GET" action="/">
        <input type="text" name="q" placeholder="Search product..." value="{{ query or '' }}">
        <button type="submit">Search</button>
    </form>

    <form method="GET" action="/">
        <select name="category">
            <option value="">All Categories</option>
            <option value="Laptop">Laptop</option>
            <option value="Desktop">Desktop</option>
            <option value="Workstation">Workstation</option>
            <option value="Mini PC">Mini PC</option>
        </select>
        <button type="submit">Filter</button>
    </form>

</div>

<!-- ================= STATS ================= -->
<div class="stats">
    <div class="card">
        <h3>Total Products</h3>
        <h2>{{ total_products }}</h2>
    </div>

    <div class="card">
        <h3>Total Stock</h3>
        <h2>{{ total_stock }}</h2>
    </div>

    <div class="card">
        <h3>Inventory Value</h3>
        <h2>${{ inventory_value }}</h2>
    </div>
</div>

<!-- ================= ADD PRODUCT ================= -->
<div class="add-form">

    <h3>Add Product</h3>

    <form method="POST" action="/add">

        <input name="name" placeholder="Name" required>
        <input name="category" placeholder="Category" required>
        <input name="stock" type="number" placeholder="Stock" required>
        <input name="price" type="number" step="0.01" placeholder="Price" required>

        <button type="submit">Add</button>

    </form>

</div>

<!-- ================= PRODUCTS ================= -->
<div class="container">

    {% for c in computers %}
    <div class="product">
        <div class="title">{{ c.name }}</div>
        <div class="category">{{ c.category }}</div>
        <div class="stock">Stock: {{ c.stock }}</div>
        <div class="price">${{ c.price }}</div>
        <button class="btn">View</button>
    </div>
    {% endfor %}

</div>

</body>
</html>
