version: "3.8"

services:

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build: ./app
    container_name: flask-app
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: "mongodb://mongo:27017/"
    depends_on:
      - mongo

volumes:
  mongo_data: